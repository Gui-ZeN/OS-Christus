name: Gmail Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 5
    steps:
      - name: Call Gmail sync endpoint
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: SYNC_URL or CRON_SECRET"
            exit 1
          fi

          HTTP_CODE=$(curl -L -sS -o /tmp/sync-response.txt -w "%{http_code}" -X POST "$SYNC_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")

          cat /tmp/sync-response.txt
          echo "HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Sync endpoint returned non-success status"
            exit 1
          fi
